<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>소수 경매 — 소수교</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ee;
  --text: #1a1a1a;
  --muted: #888;
  --border: #ccc;
  --accent: #1a1a1a;
  --btn-bg: #1a1a1a;
  --btn-text: #f5f3ee;
  --yes: #1a1a1a;
  --no: #c0392b;
  --gain: #2ecc71;
  --loss: #c0392b;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', serif;
}

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
.screen.active { display: flex; }

/* ── START ── */
.start h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: normal; line-height: 1.4; margin-bottom: 2.5rem; }
.start h1 em { font-style: italic; }
.start p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; line-height: 1.7; max-width: 320px; }

/* ── PLAY ── */
.play { gap: 0; }

.status-bar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.875rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  font-size: 0.85rem;
  z-index: 10;
}
.status-bar .label { color: var(--muted); }
.status-bar .val { font-family: monospace; font-size: 1rem; }

.play-body {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 0; padding-top: 60px;
}

.question { color: var(--muted); font-size: 1rem; margin-bottom: 1rem; letter-spacing: 0.05em; }

.big-n {
  font-family: monospace;
  font-size: clamp(3.5rem, 14vw, 6rem);
  font-weight: bold;
  line-height: 1;
  margin-bottom: 0.5rem;
  letter-spacing: -2px;
  transition: color 0.2s;
}
.big-n.flash-yes { color: var(--gain); }
.big-n.flash-no  { color: var(--loss); }

.sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 2.5rem; min-height: 1.2em; font-family: monospace; }

/* BET ROW */
.bet-row {
  display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center;
}
.bet-pill {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: 'Georgia', serif;
  font-size: 0.8rem;
  padding: 0.4rem 0.75rem;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.12s;
}
.bet-pill.active, .bet-pill:hover {
  background: var(--btn-bg);
  color: var(--btn-text);
  border-color: var(--btn-bg);
}
.bet-pill.allin {
  border-color: var(--no);
  color: var(--no);
}
.bet-pill.allin.active, .bet-pill.allin:hover {
  background: var(--no);
  color: #fff;
  border-color: var(--no);
}

.bet-amount-display {
  font-family: monospace;
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  min-height: 1.2em;
}
.bet-amount-display span { color: var(--text); font-weight: bold; }

/* ACTION BUTTONS */
.controls {
  display: flex; gap: 12px;
}
.btn {
  border: 1px solid var(--btn-bg);
  background: var(--btn-bg);
  color: var(--btn-text);
  font-family: 'Georgia', serif;
  font-size: 1.1rem;
  padding: 0.75rem 2.5rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.12s;
  min-width: 120px;
}
.btn:active { opacity: 0.75; transform: scale(0.98); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.outline {
  background: transparent;
  color: var(--text);
  border-color: var(--border);
}
.btn.outline:hover { border-color: var(--text); }
.btn.danger {
  border-color: var(--no);
  background: var(--no);
  color: #fff;
}

.btn.btn-no {
  border-color: var(--no);
  background: transparent;
  color: var(--no);
}
.btn.btn-no:hover:not(:disabled) { background: var(--no); color: #fff; }

.pass-note { font-size: 0.75rem; color: var(--muted); margin-top: 0.75rem; }

/* ── RESULT FLASH ── */
.result-toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  font-family: monospace; font-size: 0.9rem;
  padding: 0.5rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.result-toast.show { opacity: 1; }
.result-toast.pos { color: var(--gain); border-color: var(--gain); }
.result-toast.neg { color: var(--loss); border-color: var(--loss); }
.result-toast.skip { color: var(--muted); }

/* ── END ── */
.end h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: normal; margin-bottom: 1rem; }
.end .final-pts {
  font-family: monospace;
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: bold;
  line-height: 1;
  margin: 1rem 0 0.25rem;
}
.end .title-badge {
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.end .subtitle {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 2rem;
  line-height: 1.6;
}
.end .history-wrap {
  width: 100%; max-width: 340px;
  border-top: 1px solid var(--border);
  margin-bottom: 2rem;
  max-height: 200px;
  overflow-y: auto;
}
.history-row {
  display: flex; justify-content: space-between;
  padding: 0.45rem 0;
  border-bottom: 1px solid var(--border);
  font-family: monospace;
  font-size: 0.8rem;
}
.history-row .h-num { color: var(--text); }
.history-row .h-type { color: var(--muted); font-size: 0.7rem; }
.history-row .h-delta.pos { color: var(--gain); }
.history-row .h-delta.neg { color: var(--loss); }
.history-row .h-delta.skip { color: var(--muted); }

footer { font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; }

/* ── TIMER BAR ── */
.timer-bar-wrap {
  position: fixed; top: 49px; left: 0; right: 0; height: 3px;
  background: var(--border); z-index: 9;
}
.timer-bar {
  height: 100%; background: var(--text);
  transition: width 1s linear, background 0.3s;
  width: 100%;
}
.timer-bar.warn { background: #e67e22; }
.timer-bar.danger { background: var(--loss); }
#timer-label { font-family: monospace; font-size: 0.8rem; }

/* ── POINTS ANIMATION ── */
@keyframes bumpUp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
@keyframes bumpDn { 0%,100%{transform:scale(1)} 50%{transform:scale(0.9)} }
.bump-up { animation: bumpUp 0.25s ease; }
.bump-dn { animation: bumpDn 0.25s ease; }
</style>
</head>
<body>

<!-- START -->
<div class="screen active" id="screen-start">
  <h1>The <em>소수 경매</em><br>게임</h1>
  <p>소수 또는 합성수, 둘 다 베팅 가능.<br><br>패스 −100pt · 시간초과 −100pt.<br>5자리 수까지 등장.</p>
  <div class="controls">
    <button class="btn" onclick="startGame()">Start</button>
  </div>
</div>

<!-- PLAY -->
<div class="screen" id="screen-play">
  <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
  <div class="status-bar">
    <div><span class="label">Points </span><span class="val" id="pts">1000</span></div>
    <div><span class="label">Round </span><span class="val" id="rnd">1/15</span></div>
  </div>

  <div class="play-body">
    <div class="question">Is</div>
    <div class="big-n" id="big-n">?</div>
    <div class="sub" id="sub"></div>

    <div class="bet-row">
      <button class="bet-pill" data-pct="10" onclick="setPct(10)">10%</button>
      <button class="bet-pill" data-pct="25" onclick="setPct(25)">25%</button>
      <button class="bet-pill" data-pct="50" onclick="setPct(50)">50%</button>
      <button class="bet-pill" data-pct="75" onclick="setPct(75)">75%</button>
      <button class="bet-pill allin" data-pct="100" onclick="setPct(100)">ALL IN</button>
    </div>
    <div class="bet-amount-display" id="bet-display">베팅 금액을 선택하세요</div>

    <div class="controls">
      <button class="btn" id="btn-yes" onclick="declare('prime')" disabled>Yes, prime</button>
      <button class="btn btn-no" id="btn-no" onclick="declare('composite')" disabled>No, composite</button>
    </div>
    <div class="controls" style="margin-top:10px;">
      <button class="btn outline" id="btn-pass" onclick="doPass()">Pass −100</button>
    </div>
    <div class="pass-note">소수 ×<span id="mult-label">2.0</span> &nbsp;·&nbsp; 합성수 ×1.5 &nbsp;·&nbsp; <span id="timer-label">⏱ <span id="timer-sec">15</span>s</span></div>
  </div>
</div>

<!-- END -->
<div class="screen" id="screen-end">
  <h1>Game over</h1>
  <div class="title-badge" id="end-badge"></div>
  <div class="final-pts" id="end-pts">0</div>
  <div class="subtitle" id="end-sub"></div>
  <div class="history-wrap" id="end-history"></div>
  <div class="controls">
    <button class="btn" onclick="startGame()">Start again</button>
  </div>
  <footer>소수교 성전</footer>
</div>

<div class="result-toast" id="toast"></div>

<script>
// ── Primes ──
function isPrime(n) {
  if (n < 2) return false;
  if (n === 2) return true;
  if (n % 2 === 0) return false;
  for (let i = 3; i <= Math.sqrt(n); i += 2) if (n % i === 0) return false;
  return true;
}
function factorize(n) {
  const f = []; let d = 2, t = n;
  while (t > 1) {
    while (t % d === 0) { f.push(d); t = Math.floor(t / d); }
    d++; if (d * d > t && t > 1) { f.push(t); break; }
  }
  const m = {};
  f.forEach(x => m[x] = (m[x]||0)+1);
  return Object.entries(m).map(([b,e]) => e>1?`${b}^${e}`:b).join('×');
}

// ── Number pool (much harder) ──
// Tricky composites: look prime but aren't (Carmichael-adjacent, near-primes, squares of primes)
// Real primes mixed in with imposters at similar magnitude
function makePool() {
  const tier1 = shuffle([
    // easy warm-up: 2-digit, mix
    53, 57, 61, 77, 83, 87, 91, 97
  ]).slice(0, 3);

  const tier2 = shuffle([
    // 3-digit: tricky composites mixed with primes
    // composites that look prime: 221(13×17), 247(13×19), 253(11×23), 289(17²), 299(13×23), 323(17×19), 341(11×31), 361(19²)
    // real primes: 211, 223, 227, 229, 233, 239, 241, 251, 257, 263, 269, 271, 277, 281, 283
    221, 223, 247, 251, 253, 257, 263, 289, 293, 299, 311, 319, 323, 331, 337, 341, 347, 349, 353, 359, 361
  ]).slice(0, 5);

  const tier3 = shuffle([
    // 4-digit: real pain
    // composites: 1001(7×11×13), 1003(17×59), 1007(19×53), 1189(29×41), 1271(31×41), 1333(31×43), 1517(37×41), 1681(41²), 1763(41×43)
    // primes: 1009, 1013, 1019, 1021, 1031, 1033, 1039, 1049, 1051, 1061, 1063, 1069
    1001, 1003, 1007, 1009, 1013, 1019, 1021, 1031, 1033, 1039, 1049, 1051, 1063, 1189, 1231, 1271, 1279, 1283, 1289, 1297, 1301, 1303, 1333, 1361, 1367, 1373, 1381, 1399, 1409, 1423, 1517, 1523, 1531, 1543, 1549, 1553, 1559, 1567, 1571, 1579, 1583, 1597, 1601, 1607, 1609, 1613, 1619, 1621, 1627, 1637, 1657, 1663, 1667, 1669, 1681, 1693, 1697, 1699, 1709, 1721, 1723, 1733, 1741, 1747, 1753, 1759, 1763, 1777, 1783, 1787, 1789
  ]).slice(0, 5);

  const tier4 = shuffle([
    // 5-digit nightmare
    // composites: 10001(73×137), 10003(13×769), 10007(prime!), 10009(prime!), 10021(prime!), 10037(prime!)
    // very tricky: 11111(41×271), 12121(prime!), 13331(prime!no=... check), large near-primes
    // Let's carefully pick verified:
    // composites: 10001(73×137), 10003(13×769), 10027(composite? 10027=prime!), 
    // Verified composites: 10001,10003,10143(3×3381),10201(101²),10403(101×103),11011(7×11×11×13),11111(41×271),12321(111²),14641(11^4)
    // Verified primes: 10007,10009,10037,10039,10061,10067,10069,10079,10091,10093,10099,10103,10111,10133,10139
    10001, 10003, 10007, 10009, 10037, 10039, 10061, 10067, 10079, 10091, 10099, 10103, 10111, 10133, 10139, 10141, 10151, 10159, 10163, 10169, 10177, 10181, 10193, 10201, 10211, 10223, 10243, 10247, 10253, 10259, 10267, 10271, 10273, 10289, 10301, 10303, 10313, 10321, 10331, 10333, 10337, 10343, 10357, 10369, 10391, 10399, 10403
  ]).slice(0, 7);

  return [...tier1, ...tier2, ...tier3, ...tier4];
}

function shuffle(a) {
  const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;
}

// ── Timer ──
let timerInterval = null;
const TIMER_SECS = { 1:15, 2:13, 3:11, 4:9 }; // tier by digit count

function timerSecs(n) {
  const d = String(n).length;
  if (d <= 2) return 15;
  if (d === 3) return 12;
  if (d === 4) return 9;
  return 7; // 5-digit: brutal
}

function startTimer(secs) {
  clearInterval(timerInterval);
  let remaining = secs;
  const bar = document.getElementById('timer-bar');
  const sec = document.getElementById('timer-sec');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  void bar.offsetWidth;
  bar.style.transition = `width ${secs}s linear`;
  bar.style.width = '0%';

  sec.textContent = remaining;
  timerInterval = setInterval(() => {
    remaining--;
    sec.textContent = Math.max(0, remaining);
    const pct = remaining / secs;
    if (pct <= 0.25) bar.className = 'timer-bar danger';
    else if (pct <= 0.5) bar.className = 'timer-bar warn';
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timeOut();
    }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function timeOut() {
  const prime = isPrime(G.cur);
  const pen = Math.min(100, G.pts);
  const prevPts = G.pts;
  G.pts = Math.max(0, G.pts - pen);
  G.history.push({ n: G.cur, prime, bet: 0, delta: -pen, action: 'timeout' });
  flash('no', `시간초과 −${pen} pt`, 'neg');
  document.getElementById('sub').textContent = prime ? '→ 소수였습니다!' : `→ 합성수 (${factorize(G.cur)})`;
  animatePts(prevPts, G.pts);
  setTimeout(() => { if (G.pts === 0) endGame(true); else nextRound(); }, 1000);
}

// ── State ──
let G = {};

function startGame() {
  G = { pts: 1000, round: 0, total: 20, pool: makePool(), bet: 0, history: [] };
  show('play');
  nextRound();
}

function nextRound() {
  G.round++;
  if (G.round > G.total) { endGame(); return; }
  G.bet = 0;
  G.cur = G.pool[G.round - 1];

  document.getElementById('big-n').textContent = G.cur;
  document.getElementById('big-n').className = 'big-n';
  document.getElementById('pts').textContent = G.pts.toLocaleString();
  document.getElementById('rnd').textContent = `${G.round}/${G.total}`;
  document.getElementById('sub').textContent = digitHint(G.cur);
  document.getElementById('mult-label').textContent = mult().toFixed(1);
  document.getElementById('bet-display').textContent = '베팅 금액을 선택하세요';
  document.getElementById('btn-yes').disabled = true;
  document.getElementById('btn-no').disabled = true;
  document.getElementById('btn-pass').disabled = false;
  document.querySelectorAll('.bet-pill').forEach(b => b.classList.remove('active'));

  startTimer(timerSecs(G.cur));
}

function digitHint(n) {
  const d = String(n).length;
  if (d <= 2) return `${d}자리`;
  if (d === 3) return `${d}자리`;
  if (d === 4) return `${d}자리 — 신중히`;
  return `${d}자리 — 극한`;
}

function mult() {
  const d = String(G.cur).length;
  if (d >= 5) return 4.0;
  if (d === 4) return 3.0;
  if (d === 3) return 2.0;
  return 1.5;
}

function setPct(pct) {
  document.querySelectorAll('.bet-pill').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.pct) === pct);
  });
  G.bet = Math.max(1, Math.floor(G.pts * pct / 100));
  document.getElementById('bet-display').innerHTML = `베팅 <span>${G.bet.toLocaleString()} pt</span>`;
  document.getElementById('btn-yes').disabled = false;
  document.getElementById('btn-no').disabled = false;
}

function declare(guess) {
  stopTimer();
  const prime = isPrime(G.cur);
  const correct = (guess === 'prime') === prime;
  const prevPts = G.pts;
  let delta;

  if (correct) {
    const m = guess === 'prime' ? mult() : 1.5;
    delta = Math.floor(G.bet * m);
    G.pts += delta;
    flash('yes', `+${delta} pt`, 'pos');
    if (!prime) document.getElementById('sub').textContent = `= ${factorize(G.cur)}`;
  } else {
    delta = -G.bet;
    G.pts = Math.max(0, G.pts + delta);
    flash('no', `${delta} pt`, 'neg');
    document.getElementById('sub').textContent = prime ? '소수였습니다!' : `= ${factorize(G.cur)}`;
  }

  G.history.push({ n: G.cur, prime, guess, bet: G.bet, delta, action: 'declare' });
  animatePts(prevPts, G.pts);
  setTimeout(() => { if (G.pts === 0) endGame(true); else nextRound(); }, 1100);
}

function doPass() {
  stopTimer();
  const prime = isPrime(G.cur);
  const pen = Math.min(100, G.pts);
  const prevPts = G.pts;
  G.pts = Math.max(0, G.pts - pen);
  G.history.push({ n: G.cur, prime, bet: 0, delta: -pen, action: 'pass' });
  flash('no', `패스 −${pen} pt`, 'skip');
  document.getElementById('sub').textContent = prime ? '→ 소수였습니다!' : `→ 합성수 (${factorize(G.cur)})`;
  animatePts(prevPts, G.pts);
  setTimeout(() => { if (G.pts === 0) endGame(true); else nextRound(); }, 900);
}

function flash(dir, msg, cls) {
  const n = document.getElementById('big-n');
  n.classList.add(dir === 'yes' ? 'flash-yes' : 'flash-no');
  showToast(msg, cls);
  document.getElementById('btn-yes').disabled = true;
  document.getElementById('btn-no').disabled = true;
  document.getElementById('btn-pass').disabled = true;
  setTimeout(() => { n.classList.remove('flash-yes', 'flash-no'); }, 850);
}

function showToast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `result-toast show ${cls}`;
  setTimeout(() => t.classList.remove('show'), 900);
}

// ── Animated score counter ──
let countAnim = null;
function animatePts(from, to) {
  if (countAnim) cancelAnimationFrame(countAnim);
  const el = document.getElementById('pts');
  const duration = 800;
  const start = performance.now();
  const diff = to - from;
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    // ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    const cur = Math.round(from + diff * ease);
    el.textContent = cur.toLocaleString();
    if (t < 1) { countAnim = requestAnimationFrame(step); }
    else { el.textContent = to.toLocaleString(); countAnim = null; }
  }
  countAnim = requestAnimationFrame(step);
}

function endGame(bankrupt) {
  stopTimer();
  show('end');
  document.getElementById('end-pts').textContent = G.pts.toLocaleString();

  let badge, sub;
  if (bankrupt || G.pts === 0) {
    badge = '파산'; sub = '소수의 신이 외면했습니다.';
    document.getElementById('end-pts').style.color = '#c0392b';
  } else if (G.pts >= 5000) {
    badge = '대사제'; sub = '완벽한 판결. 소수의 신이 당신을 인정했습니다.';
  } else if (G.pts >= 2500) {
    badge = '성직자'; sub = '소수를 향한 믿음이 흔들리지 않았습니다.';
  } else if (G.pts >= 1000) {
    badge = '수련 신도'; sub = '소수의 진리를 더 탐구해야 합니다.';
    document.getElementById('end-pts').style.color = '#888';
  } else {
    badge = '이단 심문 대상'; sub = '소수를 믿는다 하나 실상은 달랐습니다.';
    document.getElementById('end-pts').style.color = '#c0392b';
  }
  document.getElementById('end-badge').textContent = badge;
  document.getElementById('end-sub').textContent = sub;

  const wrap = document.getElementById('end-history');
  wrap.innerHTML = '';
  G.history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const isSkip = h.action === 'pass' || h.action === 'timeout';
    const cls = isSkip ? 'skip' : h.delta > 0 ? 'pos' : 'neg';
    let tag;
    if (h.action === 'timeout') tag = '⏱';
    else if (h.action === 'pass') tag = 'pass';
    else tag = h.prime ? 'prime' : 'composite';
    const guessTag = h.action === 'declare' ? ` (${h.guess === 'prime' ? 'P' : 'C'})` : '';
    const deltaStr = isSkip ? `−${Math.abs(h.delta)}` : h.delta > 0 ? `+${h.delta}` : `${h.delta}`;
    row.innerHTML = `<span class="h-num">${h.n}</span><span class="h-type">${tag}${guessTag}</span><span class="h-delta ${cls}">${deltaStr}</span>`;
    wrap.appendChild(row);
  });
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
</script>
</body>
